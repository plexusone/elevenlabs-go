site_name: elevenlabs-go
site_description: Go SDK for ElevenLabs AI Audio API
site_author: PlexusOne
site_url: https://plexusone.github.io/elevenlabs-go/

repo_name: plexusone/elevenlabs-go
repo_url: https://github.com/plexusone/elevenlabs-go

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - CLI:
    - Overview: cli/index.md
    - tts: cli/tts.md
    - ttsscript: cli/ttsscript.md
    - Configuration: cli/configuration.md
  - Services:
    - Text-to-Speech: services/text-to-speech.md
    - Speech-to-Text: services/speech-to-text.md
    - Speech-to-Speech: services/speech-to-speech.md
